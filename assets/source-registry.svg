<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-label="MÜŞAHİT source registry">
  <title>MÜŞAHİT source registry · 37 sources</title>
  <desc>The 37 Turkish OSINT sources MÜŞAHİT polls every night, grouped by kind (RSS, HTML, PDF, API) and bias band (opposition, center, mainstream, government, foreign). Each source is represented by a small surveillance cell with a bias indicator dot.</desc>

  <style>
    .bg { fill: #0a0e0d; }
    .header-label { fill: #5a6863; font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 9px; letter-spacing: 0.25em; }
    .group-name { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 11px; font-weight: 700; letter-spacing: 0.2em; }
    .group-count { fill: #5a6863; font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 9px; letter-spacing: 0.05em; }
    .source-name { fill: #d4cab0; font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 9px; letter-spacing: 0.02em; }
    .source-name-failing { fill: #5a6863; font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 9px; letter-spacing: 0.02em; text-decoration: line-through; }
    .footer { fill: #5a6863; font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 9px; letter-spacing: 0.15em; }
    .legend-label { fill: #5a6863; font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 8px; letter-spacing: 0.15em; }
    .divider { stroke: #1a2421; stroke-width: 0.5; }
    .frame-soft { fill: none; stroke: #1a2421; stroke-width: 0.5; }
    .col-divider { stroke: #1a2421; stroke-width: 0.5; }

    /* group header colors */
    .grp-rss { fill: #7a9e7e; }
    .grp-html { fill: #b8956a; }
    .grp-pdf { fill: #7a9e7e; }
    .grp-api { fill: #5a7a5e; }

    /* bias band colors · the dot indicators */
    .bias-opp { fill: #c4423a; } /* opposition · red */
    .bias-center { fill: #d4cab0; } /* center · cream */
    .bias-main { fill: #7a9e7e; } /* mainstream · green */
    .bias-gov { fill: #b8956a; } /* government · amber */
    .bias-foreign { fill: #5a6863; } /* foreign · gray */

    /* failure pulse · sources that are currently failing */
    @keyframes warn { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.9; } }
    .warning-cell { animation: warn 2s ease-in-out infinite; }

    @media (prefers-reduced-motion: reduce) {
      .warning-cell { animation: none; }
    }
  </style>

  <!-- background -->
  <rect class="bg" width="800" height="480"/>

  <!-- header strip -->
  <g transform="translate(30, 30)">
    <text x="0" y="0" class="header-label">SOURCE REGISTRY · TURKISH OSINT</text>
    <line x1="0" y1="12" x2="740" y2="12" class="divider"/>
    <text x="740" y="0" text-anchor="end" class="header-label">37 SOURCES · 4 KINDS · PER ADR-003</text>
  </g>

  <!-- four columns · RSS / HTML / PDF / API -->
  <!-- viewBox=800w · padding 30+30 = 740 usable · 4 cols = 185 each · use 175 with 20 gap between -->
  <!-- column positions: x=30, 220, 410, 600 -->

  <!-- COLUMN 1 · RSS · biggest, 24 sources -->
  <g transform="translate(30, 75)">
    <!-- group header -->
    <rect x="0" y="0" width="175" height="32" class="frame-soft"/>
    <text x="10" y="13" class="group-name grp-rss">RSS</text>
    <text x="10" y="25" class="group-count">24 sources · feedparser</text>

    <!-- source rows · 2 per line · 12 lines total for 24 sources -->
    <g transform="translate(0, 45)">
      <!-- row 1 -->
      <circle cx="6" cy="8" r="2.5" class="bias-main"/>
      <text x="14" y="11" class="source-name">aa</text>
      <circle cx="88" cy="8" r="2.5" class="bias-gov"/>
      <text x="96" y="11" class="source-name">trt</text>

      <!-- row 2 -->
      <circle cx="6" cy="24" r="2.5" class="bias-main"/>
      <text x="14" y="27" class="source-name">ntv</text>
      <circle cx="88" cy="24" r="2.5" class="bias-main"/>
      <text x="96" y="27" class="source-name">cnn_turk</text>

      <!-- row 3 -->
      <circle cx="6" cy="40" r="2.5" class="bias-main"/>
      <text x="14" y="43" class="source-name">haberturk</text>
      <circle cx="88" cy="40" r="2.5" class="bias-main"/>
      <text x="96" y="43" class="source-name">hurriyet</text>

      <!-- row 4 -->
      <circle cx="6" cy="56" r="2.5" class="bias-main warning-cell"/>
      <text x="14" y="59" class="source-name-failing">milliyet</text>
      <circle cx="88" cy="56" r="2.5" class="bias-main"/>
      <text x="96" y="59" class="source-name">sabah</text>

      <!-- row 5 -->
      <circle cx="6" cy="72" r="2.5" class="bias-opp"/>
      <text x="14" y="75" class="source-name">cumhuriyet</text>
      <circle cx="88" cy="72" r="2.5" class="bias-opp warning-cell"/>
      <text x="96" y="75" class="source-name-failing">halk_tv</text>

      <!-- row 6 -->
      <circle cx="6" cy="88" r="2.5" class="bias-opp"/>
      <text x="14" y="91" class="source-name">birgun</text>
      <circle cx="88" cy="88" r="2.5" class="bias-opp"/>
      <text x="96" y="91" class="source-name">sozcu</text>

      <!-- row 7 -->
      <circle cx="6" cy="104" r="2.5" class="bias-opp warning-cell"/>
      <text x="14" y="107" class="source-name-failing">bianet</text>
      <circle cx="88" cy="104" r="2.5" class="bias-opp"/>
      <text x="96" y="107" class="source-name">t24</text>

      <!-- row 8 -->
      <circle cx="6" cy="120" r="2.5" class="bias-opp warning-cell"/>
      <text x="14" y="123" class="source-name-failing">medyascope</text>
      <circle cx="88" cy="120" r="2.5" class="bias-center"/>
      <text x="96" y="123" class="source-name">karar</text>

      <!-- row 9 -->
      <circle cx="6" cy="136" r="2.5" class="bias-center warning-cell"/>
      <text x="14" y="139" class="source-name-failing">dunya</text>
      <circle cx="88" cy="136" r="2.5" class="bias-foreign warning-cell"/>
      <text x="96" y="139" class="source-name-failing">voa_tr</text>

      <!-- row 10 -->
      <circle cx="6" cy="152" r="2.5" class="bias-foreign warning-cell"/>
      <text x="14" y="155" class="source-name-failing">reuters_tr</text>
      <circle cx="88" cy="152" r="2.5" class="bias-foreign"/>
      <text x="96" y="155" class="source-name">bbc_tr</text>

      <!-- row 11 -->
      <circle cx="6" cy="168" r="2.5" class="bias-foreign"/>
      <text x="14" y="171" class="source-name">dw_tr</text>
      <circle cx="88" cy="168" r="2.5" class="bias-foreign"/>
      <text x="96" y="171" class="source-name">euronews_tr</text>

      <!-- row 12 -->
      <circle cx="6" cy="184" r="2.5" class="bias-main"/>
      <text x="14" y="187" class="source-name">+ 5 more</text>
    </g>
  </g>

  <!-- COLUMN 2 · HTML · scrapers -->
  <g transform="translate(220, 75)">
    <rect x="0" y="0" width="175" height="32" class="frame-soft"/>
    <text x="10" y="13" class="group-name grp-html">HTML</text>
    <text x="10" y="25" class="group-count">8 sources · scraper</text>

    <g transform="translate(0, 45)">
      <circle cx="6" cy="8" r="2.5" class="bias-gov warning-cell"/>
      <text x="14" y="11" class="source-name-failing">anayasa_mahkemesi</text>

      <circle cx="6" cy="24" r="2.5" class="bias-gov warning-cell"/>
      <text x="14" y="27" class="source-name-failing">cumhurbaskanligi</text>

      <circle cx="6" cy="40" r="2.5" class="bias-gov warning-cell"/>
      <text x="14" y="43" class="source-name-failing">danistay</text>

      <circle cx="6" cy="56" r="2.5" class="bias-gov"/>
      <text x="14" y="59" class="source-name">tbmm</text>

      <circle cx="6" cy="72" r="2.5" class="bias-center warning-cell"/>
      <text x="14" y="75" class="source-name-failing">mahfi</text>

      <circle cx="6" cy="88" r="2.5" class="bias-center"/>
      <text x="14" y="91" class="source-name">duvar_en</text>

      <circle cx="6" cy="104" r="2.5" class="bias-center"/>
      <text x="14" y="107" class="source-name">ahval</text>

      <circle cx="6" cy="120" r="2.5" class="bias-center"/>
      <text x="14" y="123" class="source-name">turkminute</text>
    </g>
  </g>

  <!-- COLUMN 3 · PDF · Resmî Gazete -->
  <g transform="translate(410, 75)">
    <rect x="0" y="0" width="175" height="32" class="frame-soft"/>
    <text x="10" y="13" class="group-name grp-pdf">PDF</text>
    <text x="10" y="25" class="group-count">1 source · pdfminer</text>

    <g transform="translate(0, 45)">
      <circle cx="6" cy="8" r="2.5" class="bias-gov warning-cell"/>
      <text x="14" y="11" class="source-name-failing">resmi_gazete</text>
      <text x="14" y="28" class="group-count" style="font-size: 8px;">official record</text>
      <text x="14" y="42" class="group-count" style="font-size: 8px;">daily laws · appointments</text>

      <!-- a "future PDF sources" placeholder · honest about being narrow -->
      <line x1="0" y1="65" x2="160" y2="65" class="col-divider"/>
      <text x="0" y="82" class="group-count" style="font-size: 7px;">(future · UYAP · KAP · BDDK · SPK)</text>
    </g>
  </g>

  <!-- COLUMN 4 · API -->
  <g transform="translate(600, 75)">
    <rect x="0" y="0" width="175" height="32" class="frame-soft"/>
    <text x="10" y="13" class="group-name grp-api">API</text>
    <text x="10" y="25" class="group-count">4 sources · authenticated</text>

    <g transform="translate(0, 45)">
      <circle cx="6" cy="8" r="2.5" class="bias-foreign warning-cell"/>
      <text x="14" y="11" class="source-name-failing">reddit_turkey</text>

      <circle cx="6" cy="24" r="2.5" class="bias-foreign"/>
      <text x="14" y="27" class="source-name">reddit_news</text>

      <circle cx="6" cy="40" r="2.5" class="bias-gov warning-cell"/>
      <text x="14" y="43" class="source-name-failing">bist</text>

      <circle cx="6" cy="56" r="2.5" class="bias-gov warning-cell"/>
      <text x="14" y="59" class="source-name-failing">tcmb</text>
    </g>
  </g>

  <!-- LEGEND · bias bands -->
  <g transform="translate(30, 350)">
    <text x="0" y="0" class="header-label">BIAS BAND · COLOR CODE</text>
    <line x1="0" y1="12" x2="740" y2="12" class="divider"/>

    <g transform="translate(0, 30)">
      <!-- opposition -->
      <circle cx="6" cy="0" r="3.5" class="bias-opp"/>
      <text x="14" y="3" class="legend-label">OPPOSITION</text>

      <!-- center -->
      <circle cx="160" cy="0" r="3.5" class="bias-center"/>
      <text x="168" y="3" class="legend-label">CENTER · INDEPENDENT</text>

      <!-- mainstream -->
      <circle cx="380" cy="0" r="3.5" class="bias-main"/>
      <text x="388" y="3" class="legend-label">MAINSTREAM</text>

      <!-- gov -->
      <circle cx="520" cy="0" r="3.5" class="bias-gov"/>
      <text x="528" y="3" class="legend-label">GOVERNMENT</text>

      <!-- foreign -->
      <circle cx="650" cy="0" r="3.5" class="bias-foreign"/>
      <text x="658" y="3" class="legend-label">FOREIGN</text>
    </g>
  </g>

  <!-- STATUS · current health -->
  <g transform="translate(30, 410)">
    <text x="0" y="0" class="header-label">CURRENT HEALTH</text>
    <line x1="0" y1="12" x2="740" y2="12" class="divider"/>

    <g transform="translate(0, 28)">
      <circle cx="6" cy="0" r="3" fill="#7a9e7e"/>
      <text x="14" y="3" class="legend-label" style="fill: #7a9e7e; font-size: 9px;">22 / 37 OK</text>

      <circle cx="170" cy="0" r="3" fill="#b8956a" class="warning-cell"/>
      <text x="178" y="3" class="legend-label" style="fill: #b8956a; font-size: 9px;">15 / 37 FAILING · FIRST-MONTH TUNING</text>
    </g>

    <text x="0" y="38" class="legend-label" style="font-size: 8px;">FAILURES BREAKDOWN · HTTP ERROR · PARSE ERROR · URL ROT · TIMEOUT · MISSING CREDENTIALS</text>
  </g>
</svg>
