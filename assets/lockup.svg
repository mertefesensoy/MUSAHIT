<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" role="img" aria-label="MÜŞAHİT">
  <title>MÜŞAHİT · Witness · Observer</title>
  <desc>Horizontal lockup combining the surveillance viewport logo with the MÜŞAHİT wordmark, tagline, and status indicators in a PoI surveillance aesthetic.</desc>

  <style>
    .bg { fill: #0a0e0d; }
    .frame { fill: none; stroke: #7a9e7e; stroke-width: 1.5; }
    .frame-soft { fill: none; stroke: #2a3531; stroke-width: 0.5; }
    .bracket { fill: none; stroke: #b8956a; stroke-width: 2; stroke-linecap: square; }
    .eye-shadow-stroke { fill: none; stroke: #7a9e7e; stroke-width: 1.5; opacity: 0.3; }
    .eye-inner { fill: none; stroke: #7a9e7e; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    .dot { fill: #b8956a; }
    .scan { fill: #7a9e7e; opacity: 0.12; }
    .label-tiny { fill: #5a6863; font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 8px; letter-spacing: 0.2em; }
    .name { fill: #d4cab0; font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 56px; letter-spacing: 0.08em; font-weight: 700; }
    .tagline { fill: #7a9e7e; font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 13px; letter-spacing: 0.35em; }
    .meta { fill: #5a6863; font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 10px; letter-spacing: 0.18em; }
    .status-ok { fill: #7a9e7e; font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 10px; letter-spacing: 0.18em; }
    .axis { stroke: #2a3531; stroke-width: 0.5; }
    .divider { stroke: #2a3531; stroke-width: 0.5; }

    @keyframes scanline {
      0% { transform: translateY(0); opacity: 0; }
      10% { opacity: 0.3; }
      90% { opacity: 0.3; }
      100% { transform: translateY(110px); opacity: 0; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    @keyframes blink {
      0%, 95%, 100% { opacity: 1; }
      97% { opacity: 0.2; }
    }
    @keyframes status-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .scanline { animation: scanline 4s ease-in-out infinite; }
    .pulser { animation: pulse 3s ease-in-out infinite; }
    .blinker { animation: blink 5s ease-in-out infinite; }
    .status-led { animation: status-pulse 2s ease-in-out infinite; }

    @media (prefers-reduced-motion: reduce) {
      .scanline, .pulser, .blinker, .status-led { animation: none; }
    }
  </style>

  <!-- background -->
  <rect class="bg" width="800" height="240"/>

  <!-- logo group · left side -->
  <g transform="translate(30, 30)">
    <rect x="20" y="20" width="160" height="160" class="frame-soft"/>
    <rect x="45" y="45" width="110" height="110" class="frame"/>
    <path d="M 30 50 L 30 30 L 50 30" class="bracket"/>
    <path d="M 150 30 L 170 30 L 170 50" class="bracket"/>
    <path d="M 30 150 L 30 170 L 50 170" class="bracket"/>
    <path d="M 150 170 L 170 170 L 170 150" class="bracket"/>
    <rect x="46" y="46" width="108" height="2" class="scan scanline"/>
    <g class="pulser">
      <path d="M 75 80 L 100 100 L 75 120" class="eye-shadow-stroke"/>
      <path d="M 85 87 L 110 100 L 85 113" class="eye-inner"/>
      <circle cx="115" cy="100" r="2.5" class="dot blinker"/>
    </g>
    <line x1="55" y1="100" x2="70" y2="100" class="axis"/>
    <line x1="130" y1="100" x2="145" y2="100" class="axis"/>
  </g>

  <!-- wordmark + tagline · right side -->
  <g transform="translate(245, 90)">
    <!-- top tiny label · the "monitoring" header -->
    <text x="0" y="0" class="label-tiny">OSINT · TR · NIGHTLY 01:00 – 07:00</text>

    <!-- main wordmark -->
    <text x="0" y="55" class="name">MÜŞAHİT</text>

    <!-- tagline -->
    <text x="2" y="83" class="tagline">W I T N E S S · O B S E R V E R</text>

    <!-- divider line -->
    <line x1="0" y1="105" x2="490" y2="105" class="divider"/>

    <!-- status row · live system telemetry -->
    <g transform="translate(0, 125)">
      <circle cx="4" cy="-4" r="3" fill="#7a9e7e" class="status-led"/>
      <text x="14" y="0" class="status-ok">SYSTEM NOMINAL</text>

      <text x="155" y="0" class="meta">v0.1 · 2026-05-24</text>
      <text x="320" y="0" class="meta">627 / 627 TESTS</text>
    </g>
  </g>

  <!-- bottom-right corner · "RUN_ID" telemetry style -->
  <g transform="translate(620, 200)">
    <text x="0" y="0" class="label-tiny" text-anchor="start">RUN_20260524 · COMPLETED</text>
  </g>
</svg>
